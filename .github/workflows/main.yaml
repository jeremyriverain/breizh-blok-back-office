name: main

on: [push, workflow_dispatch]

jobs:
  main:
    name: main
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - name: prepare
        id: prepare
        run: |
          echo $GITHUB_REF_NAME
          echo "branch=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT
      - name: build
        run: |
          echo "${{ steps.prepare.outputs.branch }}"
          docker compose build --build-arg UID=$(id -u) --build-arg GID=$(id -g) --no-cache
          docker compose up -d
          docker compose exec -T db bash -c "npm run start"
          docker compose exec -T php bash -c "./init.sh"
      - name: lint
        run: |
          echo "lint with phpstan"
          docker compose exec -T php bash -c "composer run phpstan"
          echo "lint with eslint"
          docker compose exec -T php bash -c "npm run lint"
      - uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: ${{secrets.GOOGLE_APPLICATION_CREDENTIALS_TEST}}

      - name: unit
        run: |
          docker compose exec -T php bash -c "symfony composer phpunit"
      - name: e2e
        run: |
          touch symfony/.env.test.local
          echo "GCLOUD_PROJECT_ID=$GOOGLE_CLOUD_PROJECT" >> symfony/.env.test.local
          echo "GOOGLE_APPLICATION_CREDENTIALS=/var/www/symfony/google_credentials.json" >> symfony/.env.test.local
          mv gha-creds*.json symfony/google_credentials.json
          docker compose up -d
          docker compose exec -T cypress bash -c "npm run cy:run"

      - name: prepare deploy
        if: steps.prepare.outputs.branch == 'main'
        run: echo $HOSTS | base64 -d > deploy_hosts.php
        env:
          HOSTS : ${{secrets.HOSTS}}
      - name: deploy
        env:
          HOSTS : ${{secrets.HOSTS}}
        if: steps.prepare.outputs.branch == 'main'
        uses: deployphp/action@v1
        with:
          dep: deploy
          private-key: ${{ secrets.PRIVATE_KEY }}
          verbosity: -vvv
          deployer-version: "6.9.0"
      - name: artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: artifacts
          path: |
            e2e/cypress/videos
            e2e/cypress/screenshots
